<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月別収支計画表 — MGA Budget vs Actual</title>
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/2696.png" type="image/png" />
  <link rel="stylesheet" href="src/plan.css" />
</head>
<body class="plan-app">
  <header class="plan-header">
    <div class="plan-header-top">
      <div>
        <div class="plan-brand">
          <div class="plan-logo">MGA</div>
          <div>
            <div class="plan-company">MIYABI GAME AUDIO INC.</div>
            <div class="plan-title-row">
              <h1>月別収支計画表</h1>
              <div class="plan-period-nav">
                <button type="button" class="plan-period-btn" id="plan-period-prev" aria-label="前期">&lt;</button>
                <select class="plan-period-select" id="plan-period-select" aria-label="期"></select>
                <button type="button" class="plan-period-btn" id="plan-period-next" aria-label="翌期">&gt;</button>
                <span class="plan-period-mode" id="plan-period-mode" aria-live="polite"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="plan-meta">
        <div class="plan-meta-buttons">
          <button type="button" class="plan-csv-reload-btn" id="plan-settings-export">設定エクスポート</button>
          <button type="button" class="plan-csv-reload-btn" id="plan-settings-import">設定インポート</button>
          <input type="file" id="plan-settings-import-input" accept=".json,application/json" hidden />
          <button type="button" class="plan-csv-reload-btn" id="plan-reload-csv">CSV再読込</button>
          <button type="button" class="plan-csv-reload-btn" id="plan-change-folder">フォルダ変更</button>
        </div>
        <div class="plan-kpi" id="plan-kpi">—</div>
      </div>
    </div>
    <div class="plan-header-nav">
      <nav class="plan-toolbar" id="plan-toolbar" aria-label="表示フィルター"></nav>
      <nav class="plan-main-tabs" id="plan-main-tabs" aria-label="メインメニュー">
        <select id="plan-main-tab-select" class="plan-main-tab-select" aria-label="画面を選択">
          <option value="plan">予実表</option>
          <option value="expand">展開設定</option>
          <option value="visibility">表示設定</option>
          <option value="csvnames">CSV名定義</option>
          <option value="colors">色設定</option>
          <option value="taxrates">税率設定</option>
          <option value="taxpayments">支払い設定</option>
          <option value="employees">人件費設定</option>
          <option value="outsourcing">外注費設定</option>
          <option value="settings">その他設定</option>
        </select>
      </nav>
    </div>
  </header>

  <div class="plan-body">
    <main id="plan-root"></main>

    <footer class="plan-footer">
      <span class="plan-footer-text">MGA Budget vs Actual — MIYABI GAME AUDIO INC.</span>
      <br aria-hidden="true" />
    </footer>
  </div>

  <script src="src/plan.bundle.js" defer></script>
</body>
</html>
