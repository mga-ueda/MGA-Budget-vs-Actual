<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月別収支計画表 — MGA Budget vs Actual</title>
  <!-- Favicon: Twemoji graphics, CC BY 4.0 (https://github.com/twitter/twemoji) -->
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/2696.png" type="image/png" />
  <link rel="stylesheet" href="src/plan.css" />
</head>
<body>
  <div class="plan-app">
  <header class="plan-header">
    <div class="plan-header-top">
      <div class="plan-logo">SKK</div>
      <div class="plan-brand-center">
        <div class="plan-title-row">
          <div class="plan-brand-heading">
            <div class="plan-company">サウンド株式会社</div>
            <h1>月別収支計画表</h1>
          </div>
          <div class="plan-period-nav">
            <button type="button" class="plan-period-btn" id="plan-period-prev" aria-label="前期" title="前期を表示（Ctrl+Shift+←）">&lt;</button>
            <div class="plan-period-menu" id="plan-period-menu">
              <button
                type="button"
                class="plan-period-select plan-main-tab-select"
                id="plan-period-select-trigger"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-controls="plan-period-select-panel"
                aria-label="期"
                title="表示する期を選択"
              ></button>
              <div
                class="plan-period-select-panel plan-main-menu-panel"
                id="plan-period-select-panel"
                role="listbox"
                aria-label="期"
                hidden
              ></div>
            </div>
            <button type="button" class="plan-period-btn" id="plan-period-next" aria-label="翌期" title="翌期を表示（Ctrl+Shift+→）">&gt;</button>
            <button type="button" class="plan-dashboard-btn" id="plan-dashboard-btn" title="ダッシュボードを表示">ダッシュボードを表示</button>
          </div>
        </div>
      </div>
      <span class="plan-period-mode" id="plan-period-mode" aria-live="polite"></span>
      <div class="plan-meta">
        <nav class="plan-main-tabs" id="plan-main-tabs" aria-label="メニュー">
          <div class="plan-main-menu" id="plan-main-menu">
            <button
              type="button"
              class="plan-main-menu-trigger plan-main-tab-select"
              id="plan-main-menu-trigger"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="plan-main-menu-panel"
              title="設定・操作メニューを開く（F10）"
            >
              メニュー <kbd>F10</kbd>
            </button>
            <div class="plan-main-menu-panel" id="plan-main-menu-panel" role="menu" hidden></div>
          </div>
          <input type="file" id="plan-settings-import-input" accept=".json,application/json" hidden />
        </nav>
      </div>
    </div>
    <div class="plan-header-nav">
      <nav class="plan-toolbar" id="plan-toolbar" aria-label="表示フィルター"></nav>
      <div class="plan-kpi" id="plan-kpi">
        <div class="plan-kpi-main" id="plan-kpi-main"></div>
        <div class="plan-kpi-sub" id="plan-kpi-sub"></div>
      </div>
    </div>
  </header>

  <div class="plan-body">
    <main id="plan-root"></main>

    <footer class="plan-footer">
      <span class="plan-footer-text">MGA Budget vs Actual — MIYABI GAME AUDIO INC.</span>
      <br aria-hidden="true" />
    </footer>
  </div>
  </div>

  <script src="src/plan.bundle.js?v=1784032522907" defer></script>
</body>
</html>
